name: Release

# Publishes @junctum/agent-bridge-mcp to npm whenever package.json's version
# changes on main. Bump the "version" field in package.json and merge to main;
# if that version is already on npm the publish step is skipped (no-op), so
# ordinary merges that don't touch the version are safe.

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "src/**"
      - ".github/workflows/release.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish to npm if version changed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — skipping."
          else
            echo "Publishing $NAME@$VERSION ..."
            npm publish --access public
          fi
